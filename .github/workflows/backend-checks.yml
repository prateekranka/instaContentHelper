name: Backend checks

on:
  pull_request:
  push:
    branches:
      - main
      - codex/day-at-a-time-generation

permissions:
  contents: read

concurrency:
  group: backend-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deno:
    name: Deno contracts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Deno
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          deno-version: v2.x
      - name: Type-check and test backend
        run: deno task ci:backend
