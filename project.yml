name: MamtaContentOS
options:
  bundleIdPrefix: com.prateekranka
  deploymentTarget:
    iOS: "26.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    TARGETED_DEVICE_FAMILY: "1"
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift.git
    from: "2.0.0"
targets:
  MamtaContentOS:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - MamtaContentOS
    dependencies:
      - package: Supabase
        product: Supabase
    preBuildScripts:
      - name: Require Live Release Bootstrap
        script: |
          /bin/sh "$SRCROOT/scripts/require-live-release-bootstrap.sh"
        basedOnDependencyAnalysis: false
    configFiles:
      Debug: MamtaContentOS/Config/Runtime.xcconfig
      Release: MamtaContentOS/Config/Runtime.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.prateekranka.creatorcontenthelper
        PRODUCT_NAME: ContentHelper
        PRODUCT_MODULE_NAME: MamtaContentOS
        DEVELOPMENT_TEAM: 4JRB53LG5C
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: MamtaContentOS/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "3"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
  MamtaContentOSTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - MamtaContentOSTests
    dependencies:
      - target: MamtaContentOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.prateekranka.creatorcontenthelper.tests
        DEVELOPMENT_TEAM: 4JRB53LG5C
        CODE_SIGN_STYLE: Automatic
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ContentHelper.app/ContentHelper"
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: YES
schemes:
  MamtaContentOS:
    build:
      targets:
        MamtaContentOS: all
        MamtaContentOSTests: [test]
    test:
      targets:
        - MamtaContentOSTests
    run:
      config: Debug
